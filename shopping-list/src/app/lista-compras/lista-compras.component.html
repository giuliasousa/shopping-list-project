<div class="container">
    <h1>Lista de compras</h1>

    <form #forms="ngForm" action="" class="add-item-form" (ngSubmit)="adicionarItemLista()">
        <input type="text" id="item" placeholder="Digite o nome do item" name="item" [(ngModel)]="item">
        <button type="submit">Adicionar</button>
        <button type="button" (click)="limparLista()">Limpar tudo</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Item</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            @for (item of listaDeItens; track item.id) {
                <tr>
                    <td>{{ item.id }}</td>
                    <td><span [ngClass]="{ 'item-riscado' : item.comprado }">{{ item.nome }}</span></td>
                    <td><input type="checkbox" 
                        [checked]="item.comprado" 
                        (click)="riscarItemLista(item)">
                    </td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="3">Nenhum item adicionado.</td>
                </tr>
            }
        </tbody>
    </table>
</div>
